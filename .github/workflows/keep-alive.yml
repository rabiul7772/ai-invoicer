name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          # Use your actual Render backend URL here
          # If you haven't deployed yet, this ping will start working once you do.
          curl -s https://ai-invoicer.onrender.com/api/v1/health || echo "Endpoint not reachable yet"
